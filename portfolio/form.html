<!DOCTYPE html>
<html>
    <head>
        <title>COllege Admission Form</title>
    </head>
    <body>
        <h1>College Admission Form</h1>
        <form>
            <label>Full Name:</label>
            <input type="text"> 
            <br><br>
           <label>Email:</label>
        <input type="email">
        <br><br>
         </label>Mobile Number:</label>
        <input type="tel">  
        <br><br>
         <label>Gender:</label><br>
        <input type="radio" name="gender"value="Male">
        male<br>
        <input type="radio" name="gender"value="female">
        female<br>
        <input type="radio" name="gender"value="other">
        other
        <br><br>
        <label>Course:</label>
        <select name="course">
            <option>B.tech</option>
            <option>BCA</option>
            <option>BCOM</option>
            <option>BBA</option>
        </select>
        <br><br>
        <label>Address:</label>
        <textarea name="address" rows="4" cols="30"></textarea>
       <br><br>
       <label>Upload 12th Marksheet</label>
       <input type="file" name="Marksheet">
       <br><br>
       <label>Entrance Exam Qualified:</label>
       <input type="checkbox" name="exam" value="CUET">
       CUET<br>
       <input type="checkbox" name="exam" value="JEE Main">
       JEE Main<br>
     <input type="checkbox" name="exam" value="JEE Advance">
       JEE Advance<br>
        <input type="checkbox" name="exam" value="JEE Main">
       JEE Main<br>
     <input type="checkbox" name="exam" value="other">
       other<br>
    <br><br>
    <input type="submit" value="submit">
    <input type="reset" value="reset">

     </form>
    </body>
</html>
